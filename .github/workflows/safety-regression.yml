name: safety-regression

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  order-submit-safety:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --dev
      - name: Run config contract and text hygiene gates
        run: |
          source .venv/bin/activate
          python3 tools/check_text_hygiene.py
          python3 tools/check_env_drift.py
          python3 tools/generate_config_docs.py --check
          python3 tools/generate_env_example.py --check
          python3 -m pytest tests/test_text_hygiene.py tests/test_config_contract.py -q
          python3 -m pytest tests/test_live_preflight.py::test_live_execution_contract_emits_safe_env_metadata_and_lints tests/test_live_preflight.py::test_live_execution_contract_log_emits_redacted_fingerprint -q
          python3 -m pytest tests/test_operator_commands.py::test_cmd_signal_no_data_output_is_clean_and_actionable tests/test_operator_commands.py::test_cmd_explain_no_data_output_is_clean_and_actionable tests/test_operator_commands.py::test_cmd_status_missing_candle_output_is_clean_and_actionable -q
      - name: Run focused safety regressions
        run: >
          uv run pytest -q
          tests/test_bithumb_private_api.py::test_order_submit_auth_context_matches_official_claim_contract
          tests/test_bithumb_private_api.py::test_order_submit_uses_json_body_with_query_hash_from_canonical_payload
          tests/test_bithumb_private_api.py::test_order_submit_jwt_uses_same_canonical_payload_nonce_and_timestamp
          tests/test_bithumb_private_api.py::test_order_http_debug_request_logs_query_hash_and_json_body
          tests/test_bithumb_private_api.py::test_order_submit_live_failure_regression_uses_json_body_and_matching_query_hash
          tests/test_bithumb_private_api.py::test_order_submit_rejects_transmitted_body_byte_drift
          tests/test_bithumb_private_api.py::test_order_submit_rejects_json_kwarg_contract_drift
          tests/test_bithumb_private_api.py::test_order_submit_rejects_content_type_contract_drift
          tests/test_execution_planner.py
          tests/test_order_submit_hardening.py
          tests/test_bithumb_execution_modules.py
          tests/test_live_preflight.py
          tests/test_cli_registry.py
          tests/test_cli_help_contract.py
          tests/test_cli_guard_policy.py
          tests/test_cli_architecture.py
          tests/test_env_loading.py
          tests/test_operator_commands.py::test_main_pre_dispatch_blocks_live_run_without_startup_contract
          tests/test_operator_commands.py::test_main_pre_dispatch_blocks_live_write_command_without_preflight
          tests/test_operator_commands.py::test_cmd_run_blocks_before_lock_when_live_preflight_fails
          tests/test_deploy_systemd_units.py
      - name: Run default PR fast suite
        run: ./scripts/run_fast_pr_tests.sh
